# Training configuration for ViT-B on ImageNet-1k

defaults:
  - loss: visreg
  - _self_

# Dataset
dataset: imagenet

# Model
model: vit_b
pretrained: false
proj_gelu: true
proj_dim: 256  # Default: embed_dim // 3 = 256

# Loss
lamb: 0.9

aug:
  backend: torchvision
  cj_brightness: 0.4
  cj_contrast: 0.4
  cj_saturation: 0.2
  cj_hue: 0.05

# Data
n_global: 4
n_local: 6
global_img_size: 224
local_img_size: 96

# Training
bs: 16 # per GPU
lr: 9e-4
epochs: 100
warmup_epochs: 5
final_lr_div: 1000
clip_grad_norm: 1.0

# Checkpointing
save_ckpt: true
ckpt_dir: ./checkpoints

# Resume (set to checkpoint path to resume)
resume: null

# Wandb (set to run ID to resume logging)
wandb_id: null
